<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Resume Preview</title>

  <link type="text/css" rel="stylesheet" href="/localsite/css/base.css" id="/localsite/css/base.css" />
  <script type="text/javascript" src="/localsite/js/localsite.js?showheader=true"></script>

  <!-- PDF.js Library -->
  <script type="module">
    import * as pdfModule from "../extract/vendor/pdf.mjs";
    window.pdfjsLib = pdfModule;
    if (window.pdfjsLib && window.pdfjsLib.GlobalWorkerOptions) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "../extract/vendor/pdf.worker.mjs";
    }
    window._pdfModuleReady = true;
    window.dispatchEvent(new Event("pdfjs-ready"));
  </script>

  <!-- ResumePDFConverter - PDF-to-JSON converter -->
  <script src="../common/ResumePDFConverter.js"></script>
</head>

<body>

  <div id="cvFiltersContainer"></div>

  <script src="../common/filters.js"></script>
  <script>
    // Initialize CVFilters with PDF support
    CVFilters.init({
      personFolder: 'Noor',
      defaultJson: 'detailed.json',
      defaultTheme: 'elegant',
      defaultPDF: 'https://drive.google.com/uc?export=download&id=1BWc92phTWEe4XlVfOC3lrXZp62U4KXqI', // External PDF URL from Google Drive
      syncResumeParam: false // Don't sync resume param when using PDF
    });
  </script>

</body>
</html>
