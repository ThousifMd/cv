<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Resume Preview</title>

  <link type="text/css" rel="stylesheet" href="/localsite/css/base.css" id="/localsite/css/base.css" />
  <script type="text/javascript" src="/localsite/js/localsite.js?showheader=true"></script>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f9fafb;
      color: #333;
    }
    .pdf-status {
      padding: 10px;
      border-radius: 6px;
      margin: 10px 0;
      font-size: 13px;
    }
    .pdf-loading {
      background: #fff3cd;
      color: #856404;
    }
    .pdf-success {
      background: #d4edda;
      color: #155724;
    }
    .pdf-error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>

  <!-- PDF.js Library -->
  <script type="module">
    import * as pdfModule from "../SatvikPraveen/vendor/pdf.mjs";
    window.pdfjsLib = pdfModule;
    if (window.pdfjsLib && window.pdfjsLib.GlobalWorkerOptions) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "../SatvikPraveen/vendor/pdf.worker.mjs";
    }
    window._pdfModuleReady = true;
    window.dispatchEvent(new Event("pdfjs-ready"));
  </script>

  <!-- ResumePDFConverter - PDF-to-JSON converter -->
  <script src="../common/ResumePDFConverter.js"></script>
</head>

<body>

  <div id="cvFiltersContainer"></div>
  <div id="pdfStatusContainer"></div>

  <script src="../common/filters.js"></script>
  <script>
    // PDF configuration - Set your PDF URL here
    const PDF_CONFIG = {
      pdfUrl: "./Noor_Res.pdf" // Use local PDF file or external URL
    };

    // Load PDF resume if configured
    async function loadPdfResume() {
      if (!PDF_CONFIG.pdfUrl) {
        return null;
      }

      const pdfStatusContainer = document.getElementById("pdfStatusContainer");
      if (!pdfStatusContainer) return null;

      const statusDiv = document.createElement("div");
      statusDiv.className = "pdf-status pdf-loading";
      statusDiv.textContent = `📄 Loading PDF resume: ${PDF_CONFIG.pdfUrl}...`;
      pdfStatusContainer.appendChild(statusDiv);

      try {
        // Wait for PDF.js to be ready
        await new Promise(resolve => {
          if (window._pdfModuleReady) {
            resolve();
          } else {
            window.addEventListener("pdfjs-ready", resolve, { once: true });
          }
        });
        
        // Additional delay to ensure everything is loaded
        await new Promise(resolve => setTimeout(resolve, 300));
        
        const jsonData = await ResumePDFConverter.init({
          pdfUrl: PDF_CONFIG.pdfUrl,
          onSuccess: (data) => {
            statusDiv.className = "pdf-status pdf-success";
            statusDiv.textContent = `✅ PDF loaded successfully! Name: ${data.basics.name || "Resume"}`;
            console.log("[ResumePDFConverter] PDF loaded, name:", data.basics.name);
          },
          onError: (error) => {
            statusDiv.className = "pdf-status pdf-error";
            statusDiv.textContent = `❌ Failed to load PDF: ${error.message}`;
            console.error("[ResumePDFConverter] Error:", error);
          }
        });

        return jsonData;
      } catch (error) {
        statusDiv.className = "pdf-status pdf-error";
        statusDiv.textContent = `❌ Error: ${error.message}`;
        console.error("[loadPdfResume] Error:", error);
        return null;
      }
    }

    // Override CVFilters.loadJson to support PDF data
    const originalLoadJson = CVFilters.loadJson;
    CVFilters.loadJson = async function(jsonFile) {
      // If we have PDF data, use it instead
      if (window._currentPdfData) {
        const dataPreview = CVFilters.select('#cvDataPreview');
        if (dataPreview) {
          dataPreview.textContent = JSON.stringify(window._currentPdfData, null, 2);
        }
        return window._currentPdfData;
      }
      // Otherwise use original function
      return originalLoadJson.call(this, jsonFile);
    };

    // Override CVFilters.loadTheme to support PDF data URLs
    const originalLoadTheme = CVFilters.loadTheme;
    CVFilters.loadTheme = function(jsonFile, theme) {
      // If we have PDF data, create data URL
      if (window._currentPdfData) {
        const jsonString = JSON.stringify(window._currentPdfData);
        const dataUrl = `data:application/json;charset=utf-8,${encodeURIComponent(jsonString)}`;
        jsonFile = dataUrl;
      }
      return originalLoadTheme.call(this, jsonFile, theme);
    };

    // Initialize CVFilters
    CVFilters.init({
      personFolder: 'Noor',
      defaultJson: 'detailed.json',
      defaultTheme: 'elegant'
    });

    // Try to load PDF resume after CVFilters is initialized
    (async function() {
      const pdfData = await loadPdfResume();
      if (pdfData && pdfData.basics && pdfData.basics.name) {
        // Store PDF data for use by CVFilters
        window._currentPdfData = pdfData;
        console.log("[Init] Using PDF data, name:", pdfData.basics.name);
        
        // Reload with PDF data
        const theme = CVFilters.getParam('theme', 'elegant');
        CVFilters.loadJson(''); // Trigger load with PDF data
        CVFilters.loadTheme('', theme);
      } else {
        console.log("[Init] Using JSON file fallback");
      }
    })();
  </script>

</body>
</html>
